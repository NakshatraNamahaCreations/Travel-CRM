# Netlify config for the Vite client.
# In the Netlify site settings set the Base directory to "client".
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — serve index.html for every route so deep links / refresh don't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
